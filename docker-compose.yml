services:
  postgres:
    image: bitnami/postgresql:latest
    container_name: kafe-postgres
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRESQL_USERNAME: postgres
      POSTGRESQL_PASSWORD: postgres
      POSTGRESQL_DATABASE: kafe
    volumes:
      - kafe-pgdata:/bitnami/postgresql

  redis:
    image: redis:7-alpine
    container_name: kafe-redis
    restart: unless-stopped
    ports:
      - '6379:6379'

volumes:
  kafe-pgdata:
